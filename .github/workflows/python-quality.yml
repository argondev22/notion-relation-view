---
name: Python Code Quality

on:
  push:
    branches:
      - main
    paths:
      - "app/backend/**/*.py"
      - "app/backend/requirements.txt"
      - "app/backend/pyproject.toml"
      - ".github/workflows/python-quality.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/backend/**/*.py"
      - "app/backend/requirements.txt"
      - "app/backend/pyproject.toml"
      - ".github/workflows/python-quality.yml"

jobs:
  lint:
    name: Lint Python code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "app/backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: Run Ruff
        run: |
          cd app/backend
          ruff check app/

      - name: Run Flake8
        run: |
          cd app/backend
          flake8 app/

  format:
    name: Check code formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "app/backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: Check Black formatting
        run: |
          cd app/backend
          black --check app/

      - name: Check isort formatting
        run: |
          cd app/backend
          isort --check-only app/

  type-check:
    name: Type checking with mypy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "app/backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: Run mypy
        run: |
          cd app/backend
          mypy app/ || true

  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notion_relation_view_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "app/backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notion_relation_view_test
          SECRET_KEY: test-secret-key-for-ci
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_REDIRECT_URI: http://localhost:3000/auth/callback
        run: |
          cd app/backend
          pytest tests/ -v || echo "No tests found yet"
