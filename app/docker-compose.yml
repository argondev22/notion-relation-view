  #   image: argondev22/notion-relation-view-frontend:latest
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: notion-relation-view-frontend
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env
  #   environment:
  #     - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  redis_data:
